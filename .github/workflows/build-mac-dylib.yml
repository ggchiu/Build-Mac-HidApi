name: Build Mac dylib (Universal)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: 1. 下載 hidapi 官方原始碼
      run: git clone https://github.com/libusb/hidapi.git

    - name: 2. 安裝 CMake 工具
      run: brew install cmake

    - name: 3. 建立並執行 CMake 編譯 (指定 Intel 與 ARM 雙架構)
      run: |
        cd hidapi
        mkdir build
        cd build
        cmake .. -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
        cmake --build .

    - name: 4. 尋找編譯好的檔案並確認架構
      run: |
        # 讓系統自己找出 .dylib 的真實路徑
        DYLIB_PATH=$(find hidapi/build -name "libhidapi.dylib" | head -n 1)
        echo "成功找到檔案：$DYLIB_PATH"
        
        # 確認是否包含雙架構
        file "$DYLIB_PATH"
        
        # 把檔案複製到最外層目錄，方便下一步打包
        cp "$DYLIB_PATH" ./libhidapi.dylib

    - name: 5. 將編譯好的 .dylib 輸出成下載檔 (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: libhidapi-mac-universal
        path: ./libhidapi.dylib
